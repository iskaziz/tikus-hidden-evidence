<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TIKUS: Hidden Evidence</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameShell">
    <header class="game-header">
      <div class="brand-block" aria-label="Feisk Productions">
        <img class="feisk-logo-img" src="assets/ui/Feisk Logo.png" alt="Feisk Productions" />
      </div>

      <div class="header-spacer" aria-hidden="true"></div>

      <div class="hud" aria-label="Game status">
        <div class="hud-item"><span>Score</span><strong id="scoreText">0</strong></div>
        <div class="hud-item"><span>Time</span><strong id="timerText">30</strong></div>
      </div>
    </header>

    <main id="stageWrap">
      <canvas id="gameCanvas" width="1920" height="1080" aria-label="Hidden object level"></canvas>
      <div id="levelName" class="level-badge">SAMASIHAT WELLNESS RETREAT</div>
      <canvas id="effectsCanvas" width="1920" height="1080" aria-hidden="true"></canvas>

      <div id="mobileRotatePrompt" class="rotate-prompt hidden">
        <div class="modal-card small-card">
          <h2>Landscape Recommended</h2>
          <p>This case is best played horizontally on mobile.</p>
          <button id="rotateBtn" class="primary-btn">Go Landscape</button>
        </div>
      </div>

      <div id="messageOverlay" class="overlay">
        <div class="character-card" aria-hidden="true">
          <div class="detective-silhouette"></div>
        </div>
        <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
          <h2 id="overlayTitle">Welcome to Samasihat</h2>
          <p id="overlayText">Find the hidden evidence before time runs out.</p>
          <div class="button-row" id="overlayButtons"></div>
        </section>
      </div>
    </main>

    <footer class="clue-footer" aria-label="Clue list">
      <div class="clue-label">Clue List</div>
      <ul id="clueList"></ul>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
